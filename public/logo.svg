<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8c0ff"/>
      <stop offset="40%" stop-color="#7c68f5"/>
      <stop offset="100%" stop-color="#e8c97a"/>
    </linearGradient>
    <linearGradient id="brainGradientStrong" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dcd5ff"/>
      <stop offset="35%" stop-color="#8b78ff"/>
      <stop offset="100%" stop-color="#f0d58a"/>
    </linearGradient>
    <filter id="brainGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Brain mark: scaled up 20% and recentered -->
  <g transform="translate(128, 128) scale(1.2) translate(-128, -128)">
    <!-- Brain outline -->
    <path
      d="M128 46C95 41 63 65 62 101C43 110 40 143 62 157C60 189 90 211 124 203C151 215 188 201 193 166C215 154 216 119 195 105C195 69 162 41 128 46Z"
      fill="url(#brainGradient)"
      fill-opacity="0.18"
      stroke="url(#brainGradientStrong)"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#brainGlow)"
    />

    <!-- S-shaped fold (Walnut S) -->
    <path
      d="M126 61C109 76 110 96 128 108C149 122 150 145 128 160C112 171 112 188 128 198"
      fill="none"
      stroke="url(#brainGradientStrong)"
      stroke-width="3.5"
      stroke-linecap="round"
    />

    <!-- Brain gyri lines -->
    <path
      d="M95 86C85 100 88 119 105 127"
      fill="none"
      stroke="rgba(200, 192, 255, 0.6)"
      stroke-width="2"
      stroke-linecap="round"
    />
    <path
      d="M163 83C174 97 170 119 153 127"
      fill="none"
      stroke="rgba(200, 192, 255, 0.6)"
      stroke-width="2"
      stroke-linecap="round"
    />
    <path
      d="M94 155C105 148 114 149 122 158"
      fill="none"
      stroke="rgba(200, 192, 255, 0.6)"
      stroke-width="2"
      stroke-linecap="round"
    />
    <path
      d="M162 154C150 148 140 150 132 160"
      fill="none"
      stroke="rgba(200, 192, 255, 0.6)"
      stroke-width="2"
      stroke-linecap="round"
    />
  </g>
</svg>
